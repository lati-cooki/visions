name = "visions"
main = "worker/src/index.js"
compatibility_date = "2026-06-12"

# Production hostnames. Visions serves the l8ti.com apex + www as Custom Domains. The
# separate l8ticom Worker (Sobriety Pursuit) keeps sp.l8ti.com via its own route.
routes = [
  { pattern = "l8ti.com", custom_domain = true },
  { pattern = "www.l8ti.com", custom_domain = true },
]

# Static frontend (Vite build output). The Worker runs first only for /api/* routes
# (run_worker_first); everything else is served from ./dist with SPA fallback so client
# routes like /plan/:id resolve to index.html. Requires Wrangler >= 4.20.0.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]

# D1 database (provisioned in the wnam region). Bound as env.DB inside the Worker.
[[d1_databases]]
binding = "DB"
database_name = "visions"
database_id = "bc66bda7-fb57-445b-8d1c-7d92e2e865a3"

# Non-secret config. Location lives here so the backend prompt is market-configurable,
# mirroring src/config/site.js on the frontend. The Anthropic key is a SECRET, set via:
#   wrangler secret put ANTHROPIC_API_KEY
[vars]
LOCATION_NAME = "San Diego"
LOCATION_FLAVOR = "tourism seasons, border trade, the military community, and beach/surf culture"
ANTHROPIC_MODEL = "claude-sonnet-4-6"

# Booking notification. FROM must be on a domain onboarded to Cloudflare Email Sending
# (l8ti.com). TO is the owner address that receives alerts — set before launch; the email
# send no-ops while TO is blank, so bookings still persist either way.
BOOKING_NOTIFY_FROM = "bookings@l8ti.com"
BOOKING_NOTIFY_TO = "troy@l8ti.com"

# Backend path for plan/chat generation:
#   "true"  → drive the Managed Agent (sessions) below
#   "false" → call the Messages API directly with structured outputs
# Both paths still authenticate with the ANTHROPIC_API_KEY secret.
USE_MANAGED_AGENT = "false"
AGENT_ID = "agent_011CZtoh5iVJGPjFmdXkSDzo"
AGENT_ENV_ID = "env_015fkJc7jYAiMT6vN1DMPMBt"

# Email-verification gate + cost caps.
VERIFY_EMAIL_FROM = "plans@l8ti.com"   # FROM for code + plan emails (must be on the onboarded domain)
SITE_URL = "https://l8ti.com"          # base for /plan/:id links in the plan email
GLOBAL_DAILY_PLAN_CAP = "200"          # hard ceiling (~$10/day at ~$0.05/plan)
PER_EMAIL_DAILY_CAP = "3"
VERIFY_CODE_TTL_MIN = "10"
VERIFY_TOKEN_TTL_MIN = "30"

# Per-IP rate limiting (Workers Rate Limiting, GA) as a backstop behind Turnstile on the
# credit-spending endpoints. period must be 10 or 60 (seconds). Enforced on Cloudflare's
# network only (not in local `wrangler dev`).
# Cloudflare Email Sending binding — used to email the owner on a new booking. The FROM
# domain (l8ti.com) must be onboarded: `wrangler email sending enable l8ti.com`.
[[send_email]]
name = "EMAIL"

[[ratelimits]]
name = "PLAN_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "CHAT_RATE_LIMITER"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "VERIFY_START_RATE_LIMITER"
namespace_id = "1003"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "VERIFY_CHECK_RATE_LIMITER"
namespace_id = "1004"

  [ratelimits.simple]
  limit = 10
  period = 60
